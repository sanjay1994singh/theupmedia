<aside class="ad-slot ad-slot--{{ size|default:'wide' }}" aria-label="Advertisement">
  <div class="ad-slot__badge">ADVERTISEMENT</div>
  <div class="ad-slot__creative">
    <span class="ad-slot__label">{{ label|default:'The Up Media Services' }}</span>
    <strong>{{ title|default:'अपना न्यूज़ पोर्टल बनवाएं' }}</strong>
    <span>{{ text|default:'24 घंटे में गूगल पर होगा रैंक' }}</span>
    <span class="ad-slot__contact">Contact: {{ contact|default:'8279408396, 6397712918' }}</span>
  </div>
  <span class="ad-slot__cta">{{ cta|default:'Learn More' }}</span>
</aside>
