{% extends "base.html" %}

{% block title %}Profile - {{ SITE_NAME }}{% endblock %}

{% block content %}
<section class="auth-panel wide">
  <h1>Your Profile</h1>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save profile</button>
  </form>
</section>
{% endblock %}
