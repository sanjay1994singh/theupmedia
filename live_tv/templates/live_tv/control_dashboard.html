{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }} | The UP Media</title>
  <link rel="stylesheet" href="{% static 'live_tv/control_dashboard.css' %}">
</head>
<body>
  <div class="control-shell"
       data-overview-url="{% url 'live_tv:api_control_dashboard_section' 'overview' %}"
       data-section-url-template="{% url 'live_tv:api_control_dashboard_section' 'overview' %}"
       data-action-url="{% url 'live_tv:api_control_dashboard_action' %}">
    <aside class="control-side">
      <div class="side-brand">
        <span class="paper-mark"></span>
        <div>
          <strong>LIVE <b>TV</b></strong>
          <small>DASHBOARD</small>
        </div>
        <span class="hamburger">=</span>
      </div>
      <nav class="side-nav">
        <button class="side-item active" data-section="overview"><span>01</span>Dashboard</button>
        <button class="side-item" data-section="live"><span>02</span>Live TV <em>LIVE</em></button>
        <button class="side-item" data-section="programs"><span>03</span>Programs</button>
        <button class="side-item" data-section="epg"><span>04</span>EPG / Schedule</button>
        <button class="side-item" data-section="library"><span>05</span>Video Library</button>
        <button class="side-item" data-section="processing"><span>06</span>Upload & Processing</button>
        <button class="side-item" data-section="users"><span>07</span>Users & Devices</button>
        <button class="side-item" data-section="analytics"><span>08</span>Analytics</button>
        <button class="side-item" data-section="bandwidth"><span>09</span>Bandwidth</button>
        <button class="side-item" data-section="server"><span>10</span>Server Monitor</button>
        <button class="side-item" data-section="settings"><span>11</span>Settings</button>
      </nav>
      <div class="server-status-card">
        <div><strong>Server Status</strong><small>ONLINE</small></div>
        <p id="side-server-time">Server Time: --</p>
        <p>Timezone: Asia/Kolkata</p>
      </div>
      <a class="admin-link" href="{% url 'admin:index' %}">Open Django Admin</a>
    </aside>

    <main class="control-main">
      <header class="operator-bar">
        <div class="welcome">
          <strong>Welcome, Admin</strong>
          <small>Super Administrator</small>
        </div>
        <label class="search-box">
          <span>Search</span>
          <input type="search" placeholder="Search anything...">
        </label>
        <div class="operator-actions">
          <span class="live-chip">LIVE</span>
          <button id="manual-refresh" class="refresh-btn" type="button">Refresh</button>
          <span class="bell">12</span>
          <span class="avatar">A</span>
        </div>
      </header>

      <section id="dashboard-alert" class="dashboard-alert" hidden></section>
      <section id="dashboard-content" class="dashboard-content"></section>
    </main>
  </div>
  {{ initial_payload|json_script:"initial-dashboard-json" }}
  <script src="{% static 'live_tv/control_dashboard.js' %}"></script>
</body>
</html>
